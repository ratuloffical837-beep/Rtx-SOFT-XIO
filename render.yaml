services:
  - type: web
    name: rtx-marketing-bot
    runtime: python
    plan: free
    pythonVersion: "3.11.11"
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: BOT_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: RENDER_URL
        sync: false
